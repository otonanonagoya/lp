<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>送信完了 | 大人の名古屋</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: "Hiragino Mincho ProN", serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .wrap {
      text-align: center;
      max-width: 600px;
      padding: 40px 20px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 20px;
      letter-spacing: 0.05em;
    }

    .lead {
      font-size: 15px;
      line-height: 1.8;
      color: rgba(255,255,255,0.8);
      margin-bottom: 40px;
    }

    .highlight {
      color: #d4af37;
    }

    .box {
      border: 1px solid rgba(212,175,55,0.3);
      padding: 25px;
      margin-bottom: 40px;
      text-align: left;
    }

    .box p {
      margin: 0 0 10px;
      font-size: 14px;
      line-height: 1.6;
    }

    .cta {
      display: inline-block;
      padding: 14px 28px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 0.08em;
      color: #000;

      background: linear-gradient(
        135deg,
        #d4af37,
        #f3e5ab,
        #c9a94a
      );

      transition: all 0.3s ease;
    }

    .cta:hover {
      transform: translateY(-2px);
    }

    .sub {
      margin-top: 20px;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
    }
  </style>
</head>

<body>

  <div class="wrap">

    <h1>
      お問い合わせいただきありがとうございます。
    </h1>

    <p class="box">
      内容を確認のうえ、<span class="highlight">1営業日以内</span>にご連絡いたします。<br>
      本媒体は掲載枠に限りがあるため、<br>
      状況によりご案内できない場合がございます。
    </p>

    <a href="index.html" class="cta">
      TOPへ戻る
    </a>

    <p class="sub">
      大人の名古屋
    </p>

  </div>

</body>
</html>
